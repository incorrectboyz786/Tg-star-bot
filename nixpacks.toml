[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "freetype", "libjpeg", "libwebp", "zlib"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r bot/requirements.txt"
]

[phases.build]
cmds = []

[start]
cmd = "cd bot && /opt/venv/bin/python main.py"
